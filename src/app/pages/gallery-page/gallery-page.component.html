<section class="gallery">

  <div class="section-header">

    <h2>Our Work</h2>

    <p>
      A glimpse of our bridal and glam transformations.
    </p>

  </div>

  <div class="filter-buttons">

    <button
      [class.active]="selectedCategory === 'all'"
      (click)="filterGallery('all')"
    >
      All
    </button>

    <button
      [class.active]="selectedCategory === 'bridal'"
      (click)="filterGallery('bridal')"
    >
      Bridal
    </button>

    <button
      [class.active]="selectedCategory === 'engagement'"
      (click)="filterGallery('engagement')"
    >
      Engagement
    </button>

    <button
      [class.active]="selectedCategory === 'party'"
      (click)="filterGallery('party')"
    >
      Party
    </button>

    <button
      [class.active]="selectedCategory === 'hd'"
      (click)="filterGallery('hd')"
    >
      HD Makeup
    </button>

  </div>

  <div class="gallery-grid">

    <div
      class="gallery-item"
      *ngFor="let item of filteredGallery"
    >

      <img
        [src]="item.imageUrl"
        alt=""
      >

    </div>

  </div>

</section>
