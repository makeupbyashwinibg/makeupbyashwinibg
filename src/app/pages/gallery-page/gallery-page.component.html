<section class="gallery">

  <div class="section-header">

    <h2>Our Work</h2>

    <p>
      A glimpse of our bridal and glam transformations.
    </p>

  </div>

  <div class="gallery-grid">

    <div
      class="gallery-item"
      *ngFor="let item of galleryItems$ | async"
    >

      <img
        [src]="item.imageUrl"
        alt=""
      >

    </div>

  </div>

</section>
